name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Pytest
        run: pytest tests/ -v

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck setup.sh uninstall.sh doctor.sh bin/* vicinae/*.sh keybindings/*.sh

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON files
        run: |
          for f in $(find . -name "*.json" -o -name "*.json.example" 2>/dev/null); do
            echo "Validating JSON: $f"
            python3 -m json.tool < "$f" > /dev/null
          done

      - name: Validate TOML files
        run: |
          # tomllib é stdlib em 3.11+
          for f in $(find config/ -name "*.toml" -o -name "*.toml.example" 2>/dev/null); do
            echo "Validating TOML: $f"
            python3 -c "import tomllib; tomllib.loads(open('$f').read())"
          done

      - name: Validate SVG files
        run: |
          for f in $(find assets/ share/icons/ -name "*.svg"); do
            echo "Validating SVG: $f"
            python3 -c "import xml.etree.ElementTree as ET; ET.parse('$f')"
          done

      - name: Validate .desktop files
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y desktop-file-utils
          for f in $(find share/applications/ -name "*.desktop"); do
            echo "Validating desktop: $f"
            desktop-file-validate "$f"
          done
