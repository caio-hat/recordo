name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Pytest
        run: pytest tests/ -v

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck setup.sh uninstall.sh doctor.sh bin/* vicinae/*.sh keybindings/*.sh

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          for f in config/*.example .github/**/*.yml; do
            case "$f" in
              *.json|*.example) python3 -m json.tool < "$f" > /dev/null ;;
            esac
          done

      - name: Validate SVG files
        run: |
          for f in assets/*.svg; do
            python3 -c "import xml.etree.ElementTree as ET; ET.parse('$f')"
          done
