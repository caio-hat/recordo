<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Recordo logo">
  <title>Recordo</title>
  <desc>Botão de gravação com ondas de memória — trocadilho entre record e recordar</desc>

  <defs>
    <radialGradient id="recGrad" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="55%" stop-color="#e53e3e"/>
      <stop offset="100%" stop-color="#9b2c2c"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="rGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff5f5"/>
    </linearGradient>
  </defs>

  <!-- Ondas de memória: arcos saindo do botão record (representam "recordar") -->
  <g fill="none" stroke="#e53e3e" stroke-linecap="round" opacity="0.55">
    <path d="M 36 128 A 92 92 0 0 1 128 36" stroke-width="6"/>
    <path d="M 220 128 A 92 92 0 0 1 128 220" stroke-width="6"/>
  </g>
  <g fill="none" stroke="#e53e3e" stroke-linecap="round" opacity="0.28">
    <path d="M 18 128 A 110 110 0 0 1 128 18" stroke-width="4"/>
    <path d="M 238 128 A 110 110 0 0 1 128 238" stroke-width="4"/>
  </g>

  <!-- Botão record (círculo vermelho central) -->
  <circle cx="128" cy="128" r="78" fill="url(#recGrad)" filter="url(#softShadow)"/>

  <!-- "R" estilizada centralizada -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
     font-weight="900" font-size="116" fill="url(#rGrad)"
     text-anchor="middle" dominant-baseline="central">
    <text x="128" y="134" letter-spacing="-4">R</text>
  </g>

  <!-- Ponto de gravação (canto inferior direito) sugerindo "REC live" -->
  <circle cx="194" cy="194" r="10" fill="#ffffff" opacity="0.95"/>
  <circle cx="194" cy="194" r="6" fill="#e53e3e"/>
</svg>
